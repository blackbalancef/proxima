services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proxima
      POSTGRES_USER: proxima
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxima"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://proxima:dev@db:5432/proxima
    volumes:
      - ./projects:/projects
    restart: unless-stopped

volumes:
  pgdata:
